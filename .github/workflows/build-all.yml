name: Build LobeChat (Docker + Windows)

# ============================================
# 仅手动触发
# ============================================
on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker tag (e.g., latest, dev)'
        required: false
        type: string
        default: 'latest'
      
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: false
        type: string
      
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string

env:
  NODE_VERSION: '24.11.1'
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/lobehub

jobs:
  # ============================================================
  # Job 1: 计算版本号
  # ============================================================
  calculate-version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: hardy-one/lobehub
          ref: next
          fetch-depth: 0

      - name: Calculate version
        id: version
        shell: bash
        run: |
          # 如果手动指定了版本号，直接使用
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
            tag="v${version}"
            echo "✅ Using manual version: ${version}"
          else
            # 获取最新的 stable tag
            latest_tag=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
            
            if [ -z "$latest_tag" ]; then
              echo "⚠️ No stable tag found, using default"
              version="1.0.0"
            else
              echo "📌 Latest stable tag: $latest_tag"
              # 去掉 v 前缀，解析 major.minor.patch
              base_version="${latest_tag#v}"
              IFS='.' read -r major minor patch <<< "$base_version"
              new_patch=$((patch + 1))
              version="${major}.${minor}.${new_patch}"
            fi
            tag="v${version}"
            echo "✅ Calculated version: ${version}"
          fi
          
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "tag=${tag}" >> $GITHUB_OUTPUT

  # ============================================================
  # Job 2: 构建 Docker 镜像
  # ============================================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [calculate-version]
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          repository: hardy-one/lobehub
          ref: next
          path: lobe-chat-src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: lobe-chat-src
          file: lobe-chat-src/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_ENABLE_BETTER_AUTH=1
            NEXT_PUBLIC_ENABLE_NEXT_AUTH=0
          tags: |
            ${{ env.IMAGE_NAME }}:${{ inputs.docker_tag }}
            ${{ env.IMAGE_NAME }}:${{ needs.calculate-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker build completed
        run: |
          echo "============================================================"
          echo "  🐳 Docker 构建完成！"
          echo "============================================================"
          echo "镜像标签:"
          echo " - ${{ env.IMAGE_NAME }}:${{ inputs.docker_tag }}"
          echo " - ${{ env.IMAGE_NAME }}:${{ needs.calculate-version.outputs.version }}"
          echo "============================================================"

  # ============================================================
  # Job 3: 构建 Windows 桌面应用
  # ============================================================
  build-windows:
    name: Build Windows Desktop
    runs-on: windows-2025
    needs: [calculate-version]
    
    steps:
      # 1. 拉取源代码
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          repository: hardy-one/lobehub
          ref: next
          fetch-depth: 0

      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      # 3. 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      # 4. 安装根目录依赖
      - name: Install dependencies (root)
        run: pnpm install --node-linker=hoisted

      # 5. 移除国内 electron 镜像配置
      - name: Remove China electron mirror from .npmrc
        shell: bash
        run: |
          NPMRC_FILE="./apps/desktop/.npmrc"
          if [ -f "$NPMRC_FILE" ]; then
            sed -i.bak '/^electron_mirror=/d; /^electron_builder_binaries_mirror=/d' "$NPMRC_FILE"
            rm -f "${NPMRC_FILE}.bak"
            echo "✅ Removed electron mirror config from .npmrc"
          fi

      # 6. 在 apps/desktop 下单独安装依赖
      - name: Install deps on Desktop
        run: npm run install-isolated --prefix=./apps/desktop

      # 7. 设置版本号（使用计算出的完整版本号）
      - name: Set package version
        run: npm run workflow:set-desktop-version ${{ needs.calculate-version.outputs.version }} canary

      # 8. Windows 构建前清理
      - name: Clean previous build artifacts (Windows)
        shell: pwsh
        run: |
          Remove-Item -Path apps\desktop\release -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path apps\desktop\dist -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path C:\temp -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -Path C:\temp -ItemType Directory -Force
        env:
          TEMP: C:\temp
          TMP: C:\temp

      # 9. 构建并打包 Windows 应用
      - name: Build artifact on Windows
        run: npm run desktop:package:app
        env:
          UPDATE_CHANNEL: canary
          UPDATE_SERVER_URL: ${{ secrets.UPDATE_SERVER_URL }}
          APP_URL: http://localhost:3015
          DATABASE_URL: 'postgresql://postgres@localhost:5432/postgres'
          KEY_VAULTS_SECRET: 'oLXWIiR/AKF+rWaqy9lHkrYgzpATbW3CtJp3UfkVgpE='
          NEXT_PUBLIC_DESKTOP_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_DESKTOP_PROJECT_ID }}
          NEXT_PUBLIC_DESKTOP_UMAMI_BASE_URL: ${{ secrets.NEXT_PUBLIC_DESKTOP_UMAMI_BASE_URL }}
          TEMP: C:\temp
          TMP: C:\temp

      # 10. 显示构建产物
      - name: List final artifacts
        run: |
          echo "============================================================"
          echo "  构建产物列表"
          echo "============================================================"
          Get-ChildItem -Path apps\desktop\dist -Recurse -File -ErrorAction SilentlyContinue | Select-Object Name, Length, LastWriteTime
          Get-ChildItem -Path apps\desktop\release -Recurse -File -ErrorAction SilentlyContinue | Select-Object Name, Length, LastWriteTime
          echo "============================================================"

      # 11. 上传构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: |
            apps/desktop/dist/
            apps/desktop/release/
          retention-days: 3

      # 12. 创建 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.calculate-version.outputs.tag }}
          name: 'Windows Build ${{ needs.calculate-version.outputs.tag }}'
          body: |
            ## 🪟 Windows Desktop Build

            - **Version**: ${{ needs.calculate-version.outputs.version }}
            - **Commit**: ${{ github.sha }}
            - **Build Number**: ${{ github.run_number }}
            - **Branch**: ${{ github.ref_name }}

            ${{ inputs.release_notes && format('### 📝 更新说明\n{0}', inputs.release_notes) || '' }}

            ### ⚠️ 注意事项
            - 自动构建版本，仅供测试
            - 请备份数据后使用

            ### 📦 安装
            下载 `.exe` 文件运行安装
          files: |
            apps/desktop/dist/latest*
            apps/desktop/dist/*.exe*
            apps/desktop/dist/*.msi
            apps/desktop/dist/*.zip*
            apps/desktop/release/latest*
            apps/desktop/release/*.exe*
            apps/desktop/release/*.msi
            apps/desktop/release/*.zip*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 13. 构建完成输出
      - name: Windows build completed
        run: |
          echo "============================================================"
          echo "  🪟 Windows 构建完成！"
          echo "============================================================"
          echo "版本：${{ needs.calculate-version.outputs.tag }}"
          echo ""
          echo "Release 地址:"
          echo " https://github.com/${{ github.repository }}/releases"
          echo "============================================================"
