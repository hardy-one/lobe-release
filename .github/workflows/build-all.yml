name: Build LobeChat (Docker + Windows)

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker tag'
        required: false
        type: string
        default: 'latest'
      
      version:
        description: 'Version number'
        required: false
        type: string

env:
  NODE_VERSION: '24.11.1'
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/lobehub
  SOURCE_REPO: hardy-one/lobehub
  SOURCE_BRANCH: next

jobs:
  calculate-version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    
    steps:
      - name: Use manual version
        if: ${{ inputs.version != '' && inputs.version != null }}
        id: version_manual
        run: |
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          echo "tag=v${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Get latest tag via GitHub API
        if: ${{ inputs.version == '' || inputs.version == null }}
        id: version_auto
        run: |
          response=$(curl -s "https://api.github.com/repos/${{ env.SOURCE_REPO }}/tags?per_page=100")
          latest_tag=$(echo "$response" | grep -oE '"name":\s*"v[0-9]+\.[0-9]+\.[0-9]+"' | head -1 | sed 's/.*"v\([0-9.]*\)".*/v\1/')
          
          if [ -z "$latest_tag" ]; then
            version="$(date +%Y.%m.%d).${{ github.run_number }}"
          else
            base_version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$base_version"
            new_patch=$((patch + 1))
            version="${major}.${minor}.${new_patch}"
          fi
          
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "tag=v${version}" >> $GITHUB_OUTPUT

      - name: Set version output
        id: version
        run: |
          if [ -n "${{ steps.version_manual.outputs.version }}" ]; then
            echo "version=${{ steps.version_manual.outputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=${{ steps.version_manual.outputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ steps.version_auto.outputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=${{ steps.version_auto.outputs.tag }}" >> $GITHUB_OUTPUT
          fi

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [calculate-version]
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_BRANCH }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ✅ 升级到 v7 (Node.js 24)
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_ENABLE_BETTER_AUTH=1
            NEXT_PUBLIC_ENABLE_NEXT_AUTH=0
          tags: |
            ${{ env.IMAGE_NAME }}:${{ inputs.docker_tag }}
            ${{ env.IMAGE_NAME }}:${{ needs.calculate-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-windows:
    name: Build Windows Desktop
    runs-on: windows-2025
    needs: [calculate-version]
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_BRANCH }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --node-linker=hoisted

      - name: Remove China electron mirror
        shell: bash
        run: |
          if [ -f "./apps/desktop/.npmrc" ]; then
            sed -i.bak '/^electron_mirror=/d; /^electron_builder_binaries_mirror=/d' "./apps/desktop/.npmrc"
            rm -f "./apps/desktop/.npmrc.bak"
          fi

      - name: Install deps on Desktop
        run: npm run install-isolated --prefix=./apps/desktop

      - name: Set package version
        run: npm run workflow:set-desktop-version ${{ needs.calculate-version.outputs.version }} canary

      - name: Clean previous build
        shell: pwsh
        run: |
          Remove-Item -Path release -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path dist -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path C:\temp -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -Path C:\temp -ItemType Directory -Force
        env:
          TEMP: C:\temp
          TMP: C:\temp

      - name: Build Windows App
        run: npm run desktop:package:app
        env:
          UPDATE_CHANNEL: canary
          UPDATE_SERVER_URL: ${{ secrets.UPDATE_SERVER_URL }}
          APP_URL: http://localhost:3015
          DATABASE_URL: 'postgresql://postgres@localhost:5432/postgres'
          KEY_VAULTS_SECRET: 'oLXWIiR/AKF+rWaqy9lHkrYgzpATbW3CtJp3UfkVgpE='
          NEXT_PUBLIC_DESKTOP_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_DESKTOP_PROJECT_ID }}
          NEXT_PUBLIC_DESKTOP_UMAMI_BASE_URL: ${{ secrets.NEXT_PUBLIC_DESKTOP_UMAMI_BASE_URL }}
          TEMP: C:\temp
          TMP: C:\temp

      # 🔍 查找并显示主安装程序
      - name: Find setup executable
        id: setup_file
        shell: pwsh
        run: |
          Write-Host "============================================================"
          Write-Host "  查找主安装程序..."
          Write-Host "============================================================"
          
          # 查找 *-setup.exe 文件
          $setupFile = Get-ChildItem -Path release -Filter "*-setup.exe" -File | Select-Object -First 1
          
          if ($setupFile) {
            Write-Host "✅ 找到主安装程序：$($setupFile.Name)"
            Write-Host "   完整路径：$($setupFile.FullName)"
            Write-Host "   文件大小：$([math]::Round($setupFile.Length / 1MB, 2)) MB"
            
            # 输出文件名供后续步骤使用
            echo "filename=$($setupFile.Name)" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "❌ 未找到 *-setup.exe 文件！"
            Write-Host "release 目录内容："
            Get-ChildItem -Path release -File | Select-Object Name, Length
            echo "filename=" >> $env:GITHUB_OUTPUT
          }
          
          Write-Host "============================================================"

      # 📦 上传完整的 release 目录作为 artifact
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: release/
          retention-days: 3

      # 🎯 创建 Release（只上传主安装程序）
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.calculate-version.outputs.tag }}
          name: ${{ needs.calculate-version.outputs.tag }}
          body: ""
          # ✅ 只上传 *-setup.exe 文件
          files: release/*-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Windows build completed
        shell: pwsh
        run: |
          Write-Host "============================================================"
          Write-Host "  Windows 构建完成！"
          Write-Host "============================================================"
          Write-Host "版本：${{ needs.calculate-version.outputs.tag }}"
          Write-Host "源码：${{ env.SOURCE_REPO }}@${{ env.SOURCE_BRANCH }}"
          Write-Host ""
          if (Test-Path "release/*-setup.exe") {
            $setupFile = Get-ChildItem -Path "release" -Filter "*-setup.exe" | Select-Object -First 1
            Write-Host "✅ 主安装程序：$($setupFile.Name)"
          }
          Write-Host "Release 地址：https://github.com/${{ github.repository }}/releases"
          Write-Host "============================================================"
